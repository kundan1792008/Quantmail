version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quantmail-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quantmail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantmail_secret}
      POSTGRES_DB: ${POSTGRES_DB:-quantmail}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quantmail} -d ${POSTGRES_DB:-quantmail}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quantmail-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quantmail-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://${POSTGRES_USER:-quantmail}:${POSTGRES_PASSWORD:-quantmail_secret}@postgres:5432/${POSTGRES_DB:-quantmail}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      SSO_SECRET: ${SSO_SECRET:?SSO_SECRET must be set in .env file}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:?ENCRYPTION_SECRET must be set in .env file}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
