name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint (type-check)
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
